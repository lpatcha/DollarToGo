version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: dollartogo_db
    restart: always
    environment:
      POSTGRES_USER: dollartogo_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: dollartogo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
